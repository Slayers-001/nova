<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arghyaa | Identity Archive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;300;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent-pink: #FF007F;
            --deep-pink: #E91E63;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #2D3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Ambient Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(255, 182, 193, 0.4); top: -5%; left: -5%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(181, 255, 252, 0.4); bottom: -5%; right: -5%; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* Responsive Glass Card */
        .main-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: grid;
            grid-template-columns: 350px 1fr;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }

        /* Sidebar Responsive Styling */
        .sidebar {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            border-right: 1px solid var(--glass-border);
        }

        .version-tag {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--accent-pink);
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #333, var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            margin-top: 15px;
            font-weight: 300;
            opacity: 0.6;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Content Area */
        .content-area {
            padding: 60px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .content-area::-webkit-scrollbar { display: none; }

        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.55rem;
            color: var(--accent-pink);
            margin-bottom: 30px;
            display: block;
        }

        .quote-wall {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: 200;
            text-align: justify;
            color: var(--text-dark);
            opacity: 0.8;
        }

        .quote-wall span {
            display: inline-block;
            margin-right: 8px;
        }

        .warning-text {
            margin-top: 30px;
            font-weight: 700;
            color: var(--accent-pink);
            text-transform: lowercase;
            display: block;
        }

        /* Mobile Adjustments (Phones) */
        @media (max-width: 850px) {
            body { padding: 10px; overflow-y: auto; }
            
            .main-card {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 95vh;
            }

            .sidebar {
                padding: 40px 30px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                text-align: center;
                gap: 40px;
            }

            .hero h1 { font-size: 3rem; }

            .content-area {
                padding: 40px 30px;
                height: 500px; /* Limits height on mobile for internal scroll */
            }

            .quote-wall { font-size: 1.1rem; }
            
            .orb { filter: blur(50px); width: 150px; height: 150px; }
        }

        .footer-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--accent-pink);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0px var(--accent-pink); }
            50% { box-shadow: 0 0 15px var(--accent-pink); }
            100% { box-shadow: 0 0 0px var(--accent-pink); }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="main-card" id="siteContainer">
        <aside class="sidebar">
            <div class="version-tag">Mobile Ready V.2</div>
            
            <div class="hero">
                <h1 id="nameHeader">ARGHYAA</h1>
                <p>System Admin // Archive</p>
            </div>

            <div class="footer-status">
                <div class="dot"></div> ENCRYPTED
            </div>
        </aside>

        <section class="content-area">
            <span class="section-label">// ACCESSING_STREAM</span>
            <div class="quote-wall" id="wall">
                </div>
        </section>
    </main>

    <script>
        const wall = document.getElementById('wall');
        const count = 150; 

        for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.textContent = "Mihika";
            wall.appendChild(span);
        }

        const warning = document.createElement('span');
        warning.className = "warning-text";
        warning.textContent = "be careful she is very dangerous";
        wall.appendChild(warning);

        // Responsive GSAP Entrance
        window.addEventListener('load', () => {
            gsap.to("#siteContainer", {
                duration: 1.2,
                opacity: 1,
                y: 0,
                ease: "power3.out"
            });
            
            gsap.from(".hero h1", {
                duration: 1,
                opacity: 0,
                x: -30,
                delay: 0.5
            });
        });
    </script>
</body>
</html>
