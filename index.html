<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arghyaa | Dedicated</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        :root {
            --bg-color: #ffc1e3; /* Original Pink Project Color */
            --accent-pink: #ff4d94;
            --deep-pink: #d63384;
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-color);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle animated texture for the background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1;
            z-index: 0;
        }

        .glass-shell {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(214, 51, 132, 0.3);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--deep-pink);
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-shadow: 0 10px 20px rgba(214, 51, 132, 0.1);
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 500;
        }

        .line-accent {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--deep-pink), transparent);
            margin: 20px auto;
        }

        /* Advanced Scrollable Area */
        .viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px 50px 50px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .viewport::-webkit-scrollbar {
            width: 0px; /* Hidden for a cleaner look */
        }

        .text-stream {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .word-unit {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--deep-pink);
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 18px;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .word-unit:hover {
            background: var(--deep-pink);
            color: white;
            transform: scale(1.15) rotate(3deg);
            box-shadow: 0 15px 30px rgba(214, 51, 132, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--deep-pink);
            opacity: 0.6;
            font-weight: 500;
        }

        /* Corner accents for "Advance" feel */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid var(--deep-pink);
            opacity: 0.2;
        }
        .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; border-radius: 20px 0 0 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; border-radius: 0 0 20px 0; }
    </style>
</head>
<body>

    <div class="glass-shell">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <header>
            <div class="tagline">Official Site of</div>
            <h1 class="title">Arghyaa</h1>
            <div class="line-accent"></div>
        </header>

        <div class="viewport">
            <div class="text-stream" id="wall">
                </div>
        </div>

        <footer>
            EST. 2026 &bull; PROJECT ARGH-MHK
        </footer>
    </div>

    <script>
        const wall = document.getElementById('wall');
        const text = "Mihika";
        const count = 250; 

        for (let i = 0; i < count; i++) {
            const span = document.createElement('div');
            span.className = 'word-unit';
            span.textContent = text;
            
            // Randomize entry animation slightly
            span.style.animation = `fadeIn 1s ease forwards ${i * 0.005}s`;
            span.style.opacity = "0"; 

            wall.appendChild(span);
        }
    </script>
</body>
</html>
